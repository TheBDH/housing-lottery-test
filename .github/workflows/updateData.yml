name: Process PDF and Update Site

on:
  workflow_dispatch:
    inputs:
      pdf_path:
        description: 'Path to PDF in repository'
        required: true
        type: string

permissions:
  contents: write

jobs:
  process-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install pandas tabula-py

      - name: Convert PDF to CSV
        run: python pdfToCSV.py "${{ inputs.pdf_path }}"

      - name: Update housing JSON
        run: python lottery_json_writer.py

      - name: Manually commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          if git diff-index --quiet HEAD; then
            echo "No changes to commit. The files were identical or missing."
          else
            git commit -m "Data Desk Update: refresh liveData and housing output"
            git push
          fi