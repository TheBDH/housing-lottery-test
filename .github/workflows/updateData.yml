name: Process PDF and Update Site

on:
  workflow_dispatch:
    inputs:
      pdf_path:
        description: 'Path to PDF in repository'
        required: true
        type: string
      publish_date:
        description: 'Date in April (ie 6/7/8)'
        required: true
        type: string
      publish_time:
        description: '4 digit 24-hour time (ie 0900/1100/1300)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  process-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install pandas tabula-py

      - name: Convert PDF to CSV
        run: python pdfToCSV.py "${{ inputs.pdf_path }}" "${{ inputs.publish_date }}" "${{ inputs.publish_time }}"

      - name: Update housing JSON
        run: python lottery_json_writer.py

      - name: Manually commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          if git diff-index --quiet HEAD; then
            echo "No changes to commit. The files were identical or missing."
          else
            git commit -m "Data Desk Update: Added PDF and parsed data for ${{ inputs.publish_date }} at ${{ inputs.publish_time }}"
            git push
          fi